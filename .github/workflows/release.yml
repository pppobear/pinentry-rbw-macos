name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            artifact_suffix: macos-arm64
          - runner: macos-15-intel
            artifact_suffix: macos-x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          latest_xcode_app="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V | tail -n 1)"
          sudo xcode-select -s "$latest_xcode_app/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Build release binary
        run: swift build -c release

      - name: Prepare artifacts
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.version || github.ref_name }}"
          binary_name="pinentry-rbw-macos"
          archive_name="${binary_name}-${version}-${{ matrix.artifact_suffix }}"

          mkdir -p "dist/$archive_name"
          cp ".build/release/$binary_name" "dist/$archive_name/"
          cp README.md "dist/$archive_name/"
          cp pinentry-wrapper.sh "dist/$archive_name/"
          cp -r completions "dist/$archive_name/"

          ditto -c -k --sequesterRsrc --keepParent \
            "dist/$archive_name" \
            "dist/${archive_name}.zip"

          shasum -a 256 "dist/${archive_name}.zip" > "dist/${archive_name}.zip.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_suffix }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        run: |
          set -euo pipefail
          find dist -type f \( -name "*.zip" -o -name "*.sha256" \) -exec mv {} dist/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.sha256

  update_homebrew_tap:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN != '' }}
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
      TAP_REPOSITORY: ${{ github.repository_owner }}/homebrew-tap
      FORMULA_PATH: Formula/pinentry-rbw-macos.rb

    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Compute source archive checksum
        id: archive
        run: |
          set -euo pipefail
          archive_url="https://github.com/${{ github.repository }}/archive/refs/tags/${VERSION}.tar.gz"
          curl -fsSL "$archive_url" -o source.tar.gz
          echo "url=$archive_url" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum source.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$FORMULA_PATH")"
          cat > "$FORMULA_PATH" <<EOF
          class PinentryRbwMacos < Formula
            desc "macOS pinentry for rbw with Touch ID or Apple Watch authentication"
            homepage "https://github.com/${{ github.repository }}"
            url "${{ steps.archive.outputs.url }}"
            sha256 "${{ steps.archive.outputs.sha256 }}"
            head "https://github.com/${{ github.repository }}.git", branch: "main"

            depends_on :macos

            def install
              system "swift", "build", "-c", "release", "--disable-sandbox"
              bin.install ".build/release/pinentry-rbw-macos"
            end

            test do
              assert_match "pinentry-rbw-macos", shell_output("#{bin}/pinentry-rbw-macos --help")
            end
          end
          EOF

      - name: Commit and push formula update
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA_PATH"
          if git diff --cached --quiet -- "$FORMULA_PATH"; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "Update pinentry-rbw-macos to ${VERSION}"
          git push origin HEAD:main
