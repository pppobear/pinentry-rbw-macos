name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-15
          - macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify pinned toolchain
        run: |
          set -euo pipefail
          test -d "$DEVELOPER_DIR"
          xcodebuild -version | tee xcode-version.txt
          grep -Fxq "Xcode 16.2" xcode-version.txt
          swift --version | tee swift-version.txt
          grep -Eq 'Swift version 6\.0([.[:space:]]|$)' swift-version.txt

      - name: Build and test
        run: |
          set -euo pipefail
          swift test
          swift build
          binary_path="$(swift build --show-bin-path)/pinentry-rbw-macos"
          python3 scripts/test-tty.py "$binary_path"
